<svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B7CFF"></stop>
      <stop offset="100%" stop-color="#6C5DD3"></stop>
    </linearGradient>
  </defs>

  <!-- Outer rounded square -->
  <rect x="0" y="0" width="96" height="96" rx="24" fill="url(#bgGradient)"></rect>

  <!-- Outer ring -->
  <circle cx="48" cy="48" r="30" fill="none" stroke="white" stroke-width="4" opacity="0.5"></circle>

  <!-- Inner ring -->
  <circle cx="48" cy="48" r="22" fill="none" stroke="white" stroke-width="4" opacity="0.9"></circle>

  <!-- Center dot -->
  <circle cx="48" cy="48" r="10" fill="white"></circle>
</svg>
